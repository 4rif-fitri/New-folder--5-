<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="../../src/style/layout.css">
	<link rel="stylesheet" href="../../src/style/part&hole.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Math&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
		rel="stylesheet">
</head>

<body>
	<div class="container">

		<div class="phone">
			<header>

				<div>
					<a href="./index.html">
						<p class="x">x</p>
					</a>
					<div class="bar">
						<div class="barFill"></div>
					</div>
					<p></p>
				</div>

			</header>
			<main>
				<div id="viewport">
					<div id="wrapper">

					</div>
				</div>
			</main>
			<footer>
				<button class="btnCheck soft-box">NEXT</button>
			</footer>
		</div>

	</div>
	<script type="module">
		import {
			show, renderList, renderDiagramBox, renderDiagram,
			renderText, avatar, diagramTerbalik, speak,
			renderTeknik
		} from "../../src/js/helper.js";

		const nextBtn = document.querySelector(".btnCheck");
		nextBtn.addEventListener("click", () => addDialog())
		const viewport = document.getElementById("viewport");
		let index = 0

		let json = [
			{
				id: 1,
				type: "text",
				text: "Mari belajar Number Bonds!"
			},
			{
				id: 2,
				type: "text",
				text: "Number Bonds ialah cara memecahkan satu nombor kepada dua bahagian"
			},
			{
				id: 3,
				type: "diagram",
				text: "Contohnya, nombor 5 boleh dipecahkan kepada 3 dan 2.",
				content: {
					whole: 5,
					part1: 3,
					part2: 2
				}
			},
			{
				id: 4,
				type: "diagram_terbalik",
				text: "Apabila kita gabungkan 3 dan 2, kita akan dapat 5 semula",
				content: {
					whole: 5,
					part1: 3,
					part2: 2
				}
			},
			{
				id: 6,
				type: "diagram",
				text: "Nombor 5 juga boleh dipecahkan kepada 1 dan 4",
				content: {
					whole: 5,
					part1: 1,
					part2: 4
				}
			},
			{
				id: 7,
				type: "list",
				text: "Satu nombor boleh mempunyai banyak pasangan Number Bonds",
				content: {
					items: [
						"0 + 5 = 5",
						"1 + 4 = 5",
						"2 + 3 = 5",
						"3 + 2 = 5",
						"4 + 1 = 5",
						"5 + 0 = 5"
					]
				}
			},
		]

		let lenghtDialog = json.length
		let barFill = document.querySelector(".barFill")
		const clickSound = new Audio("../../sounds/click.wav");

		function addDialog(data = json[index++]) {
			if (index >= lenghtDialog + 1) return
			clickSound.play();

			// speak(data.text)
			barFill.style.width = `${(index / lenghtDialog) * 100}%`
			const isBottom = viewport.scrollHeight - viewport.scrollTop <= viewport.clientHeight + 50;

			const dialog = document.createElement("div");
			dialog.className = "content fadeIn";

			if (data.type == "text") dialog.innerHTML = renderText(data);
			else if (data.type == "diagramBox") dialog.innerHTML = renderDiagramBox(data);
			else if (data.type == "diagram") dialog.innerHTML = renderDiagram(data);
			else if (data.type == "diagram_terbalik") dialog.innerHTML = diagramTerbalik(data)
			else if (data.type == "list") dialog.innerHTML = renderList(data)
			else if (data.type == "teknik") dialog.innerHTML = renderTeknik(data)
			console.log(data.type);

			const wrapper = document.getElementById("wrapper");

			wrapper.appendChild(dialog);

			if (isBottom) {
				requestAnimationFrame(() => {
					viewport.scrollTo({
						top: viewport.scrollHeight,
						behavior: "smooth"
					});
				});
			}
		}
		addDialog()
	</script>
</body>

</html>
