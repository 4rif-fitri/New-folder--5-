<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="../../src/style/style.css">

</head>

<body>
	<div class="container">
		<div class="phone">
			<header>

				<div>
					<a href="./index.html">
						<p class="x">x</p>
					</a>
					<div class="bar">
						<div class="barFill"></div>
					</div>
					<p></p>
				</div>

			</header>
			<main>
				<div id="viewport">
					<div id="wrapper">

					</div>
				</div>
			</main>
			<footer>
				<h2 class="textFooter"></h2>
				<button class="btnNext soft-box hidden">NEXT</button>
				<button class="btnCheck soft-box">CHECK</button>
				<button class="btnContinue soft-box hidden">CONTINUE</button>
			</footer>
		</div>
	</div>
	<script type="module">
		import { showCorrect, showWrong, PopUpDone } from "../../src/js/helper.js";
		import { questionRegistry } from "../../src/js/questionRegistry.js";

		let ori = [
			{
				text: "Teknik pelengkap 10",
				type: "teknikPelengkap10",
				content: {
					options: [8, 5]
				}
			},
			{
				text: "Teknik pelengkap 10",
				type: "teknikPelengkap10",
				content: {
					options: [9, 5]
				}
			}
		]

		function generateJson(data) {
			const [a, b] = data.content.options;

			const besar = Math.max(a, b);
			const kecil = Math.min(a, b);

			const pelengkap = 10 - besar;
			const baki = kecil - pelengkap;
			const jumlah = besar + kecil;

			return [
				{
					text: "Pilih nombor paling besar",
					type: "pick",
					options: [a, b],
					content: {
						options: [a, b],
						pelengkap
					},
					answer: besar
				},
				{
					text: `${besar} perlukan berapa untuk jadi 10`,
					type: "needed",
					options: [pelengkap, pelengkap + 1, kecil],
					content: {
						options: [a, b],
						pelengkap
					},
					answer: pelengkap
				},
				{
					text: `${pelengkap} itu kita akan ambil dari __`,
					type: "pecah",
					options: [a, b, besar],
					content: {
						options: [besar, ""],
						pelengkap
					},
					answer: kecil
				},
				{
					text: `${kecil} akan dipecahkan kepada ${pelengkap} dan __`,
					type: "baki",
					options: [baki, pelengkap, kecil],
					content: {
						options: [a, b],
						pelengkap,
						baki
					},
					answer: baki
				},
				{
					text: `${besar} tambah ${pelengkap} akan dapat __`,
					type: "gabung",
					options: [10, 11, 12],
					content: {
						options: [a, b],
						pelengkap,
						baki
					},
					answer: 10
				},
				{
					text: `10 tambah ${baki} akan dapat __`,
					type: "sum",
					options: [jumlah, jumlah - 1, jumlah + 1],
					content: {
						options: [a, b],
						pelengkap,
						baki
					},
					answer: jumlah
				},
				{
					text: `${besar} tambah ${kecil} akan dapat __`,
					type: "summery",
					options: [jumlah, jumlah - 1, jumlah + 1],
					content: {
						options: [a, b],
						pelengkap,
						baki
					},
					answer: jumlah
				}
			];
		}

		let json = [];

		let state = {
			stepIndex: 0,
			stepLenght: 0,
			questionIndex: 0,
			questionLenght: 0,
			numberPicked: null,
			elementPicked: null,
			currentData: null,
			isReset: false,
			question: null,
			indexProgress: 0,
			lenghtProgress:0,

		}

		let ui = {
			barFill: document.querySelector(".barFill"),
			viewport: document.getElementById("viewport"),
			btnCheck: document.querySelector(".btnCheck"),
			btnNext: document.querySelector(".btnNext"),
			btnContinue: document.querySelector(".btnContinue"),
			footer: document.querySelector("footer"),
			textFooter: document.querySelector(".textFooter"),
		}

		function loadQuestion() {
			json = generateJson(ori[state.questionIndex]);

			state.questionLenght = ori.length
			state.stepIndex = 0;
			state.stepLenght = json.length;
			state.lenghtProgress = state.stepLenght * state.questionLenght
		}

		let hanldeContinue = () => {

			ui.textFooter.classList.toggle("hidden")
			ui.btnContinue.classList.toggle("hidden")
			ui.btnCheck.classList.toggle("hidden")
			ui.footer.classList.remove("soft-green", "soft-red")

			if (state.numberPicked == state.currentData.answer) {
				state.indexProgress++
				ui.barFill.style.width = `${(state.indexProgress / state.lenghtProgress) * 100}%`
				main()
			} else {
				let allElements = document.querySelectorAll(".higlight");
				let lastElement = allElements[allElements.length - 1];
				lastElement.classList.remove("higlight");
			}

			state.numberPicked = null;
			state.isReset = false
		}

		let hanldeCheck = () => {
			if (state.numberPicked == null || state.isReset == true) return
			state.isReset = true

			if (state.question.check(state.numberPicked, state.currentData)) {

				let lastElement = document.querySelector(".content:last-child");

				showCorrect(ui)

				state.question.afterCorrect?.(lastElement, state.numberPicked, state.currentData);

			} else {
				showWrong(ui)
			}
		}

		let main = () => {

			if (state.stepIndex >= state.stepLenght) {
				state.questionIndex++;

				if (state.questionIndex < state.questionLenght) {
					document.querySelectorAll(".content").forEach(c => c.remove())
					loadQuestion();
					main()
				} else {
					PopUpDone();
				}
				return
			}
			let data = json[state.stepIndex++]
			state.currentData = data;
			state.question = questionRegistry[state.currentData.type];

			const lastContent = document.querySelector(".content:last-child");

			if (lastContent) {
				lastContent.querySelectorAll(".btnAns, .eqn").forEach(el => {
					el.style.pointerEvents = "none";
				});
			}

			let dialog = document.createElement("div");
			dialog.className = "content fadeIn";

			dialog.innerHTML = state.question.render(data);
			wrapper.appendChild(dialog);

			state.question.setup(value => state.numberPicked = value, () => !state.isReset);

			let isBottom = viewport.scrollHeight - viewport.scrollTop <= viewport.clientHeight + 50;
			if (isBottom) {
				requestAnimationFrame(() => {
					viewport.scrollTo({
						top: viewport.scrollHeight,
						behavior: "smooth"
					});
				});
			}
		}

		ui.btnCheck.addEventListener("click", hanldeCheck)
		ui.btnContinue.addEventListener("click", hanldeContinue)

		loadQuestion();
		main()
	</script>
</body>

</html>
